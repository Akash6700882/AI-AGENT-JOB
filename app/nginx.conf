server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Container healthcheck target (see Dockerfile's HEALTHCHECK).
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — client-side routes (React Router / Vite) don't map to
    # real files on disk, so unmatched paths fall back to index.html and
    # let the app's own router decide what to render.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets (Vite fingerprints filenames, so a
    # cached stale asset is never served under the same URL).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
